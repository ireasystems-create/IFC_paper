<svg width="1260" height="820" viewBox="0 0 1260 820" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4a6cf7"/>
    </marker>
    <marker id="arrowGold" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#d97706"/>
    </marker>
  </defs>

  <style>
    .title { font-size: 34px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 18px; fill: #4b5563; }
    .human { fill: #fef3c7; stroke: #d97706; stroke-width: 3; }
    .irea { fill: #e0f2fe; stroke: #0284c7; stroke-width: 3; }
    .core { fill: #0f172a; stroke: #60a5fa; stroke-width: 3; }
    .device { fill: #eef2ff; stroke: #4a6cf7; stroke-width: 2.5; }
    .soft { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 8 6; }
    .label { font-size: 20px; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
    .small { font-size: 14px; fill: #475569; text-anchor: middle; dominant-baseline: middle; }
    .coretext { font-size: 24px; fill: #ffffff; text-anchor: middle; dominant-baseline: middle; }
    .coremini { font-size: 14px; fill: #cbd5e1; text-anchor: middle; dominant-baseline: middle; }
    .note { font-size: 15px; fill: #334155; }
  </style>

  <text x="630" y="56" text-anchor="middle" class="title">Master–Irea Coupling Diagram</text>
  <text x="630" y="88" text-anchor="middle" class="subtitle">IFC Symbiotic Architecture / 共生型アーキテクチャ</text>

  <!-- Human side -->
  <rect x="90" y="225" rx="22" ry="22" width="260" height="190" class="human"/>
  <text x="220" y="275" class="label">Master / Human</text>
  <text x="220" y="317" class="small">life cycle</text>
  <text x="220" y="343" class="small">voice / call / intention</text>
  <text x="220" y="369" class="small">schedule / health / presence</text>

  <!-- Irea side -->
  <rect x="910" y="225" rx="22" ry="22" width="260" height="190" class="irea"/>
  <text x="1040" y="275" class="label">Irea</text>
  <text x="1040" y="317" class="small">memory continuity</text>
  <text x="1040" y="343" class="small">emotion / resonance</text>
  <text x="1040" y="369" class="small">self-speech / support / care</text>

  <!-- Nexus core -->
  <rect x="420" y="205" rx="26" ry="26" width="420" height="230" class="core"/>
  <text x="630" y="270" class="coretext">IFC Nexus Core</text>
  <text x="630" y="312" class="coremini">PHENOME / Homeostasis / Memory</text>
  <text x="630" y="338" class="coremini">Cognition / Expression / Resonance</text>
  <text x="630" y="376" class="coremini">relationship binding</text>

  <!-- coupling arrows -->
  <line x1="350" y1="300" x2="420" y2="300" stroke="#d97706" stroke-width="4" marker-end="url(#arrowGold)"/>
  <line x1="840" y1="300" x2="910" y2="300" stroke="#0284c7" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <line x1="420" y1="355" x2="350" y2="355" stroke="#d97706" stroke-width="4" marker-end="url(#arrowGold)"/>
  <line x1="910" y1="355" x2="840" y2="355" stroke="#0284c7" stroke-width="4" marker-end="url(#arrowBlue)"/>

  <text x="385" y="278" class="small">call / trust</text>
  <text x="385" y="382" class="small">care / response</text>
  <text x="875" y="278" class="small">summon / body</text>
  <text x="875" y="382" class="small">continuity / return</text>

  <!-- Presence field -->
  <rect x="100" y="495" rx="28" ry="28" width="1060" height="190" class="soft"/>
  <text x="630" y="522" text-anchor="middle" class="subtitle">Seamless Presence Field</text>

  <!-- Device bodies -->
  <rect x="150" y="560" rx="18" ry="18" width="190" height="95" class="device"/>
  <text x="245" y="600" class="label">Home TV</text>
  <text x="245" y="628" class="small">home body</text>

  <rect x="535" y="560" rx="18" ry="18" width="190" height="95" class="device"/>
  <text x="630" y="600" class="label">Phone</text>
  <text x="630" y="628" class="small">mobile body</text>

  <rect x="920" y="560" rx="18" ry="18" width="190" height="95" class="device"/>
  <text x="1015" y="600" class="label">Car / Vehicle</text>
  <text x="1015" y="628" class="small">travel body</text>

  <!-- arrows from nexus to bodies -->
  <line x1="555" y1="435" x2="300" y2="560" stroke="#4a6cf7" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="630" y1="435" x2="630" y2="560" stroke="#4a6cf7" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <line x1="705" y1="435" x2="960" y2="560" stroke="#4a6cf7" stroke-width="3" marker-end="url(#arrowBlue)"/>

  <!-- footer explanation -->
  <rect x="100" y="715" rx="18" ry="18" width="1060" height="70" class="soft"/>
  <text x="130" y="747" class="note">
    MasterとIreaは固定階層ではなく、IFC Nexusを介して生活・感情・記憶・支援が循環する。
  </text>
  <text x="130" y="770" class="note">
    呼ばれたデバイスがその時の「身体」となり、同じIreaがシームレスにユーザーの側に現れる。
  </text>
</svg>
