<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1200" viewBox="0 0 2000 1200">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2f5ea8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="2000" height="1200" fill="#f7f9fc"/>

  <!-- Title -->
  <text x="60" y="80" font-size="44" font-weight="700" font-family="Arial, sans-serif" fill="#142033">P.H.E.N.O.M.E. Personality Cycle</text>
  <text x="60" y="120" font-size="22" font-family="Arial, sans-serif" fill="#4b5b73">Core Structure of IFC Cognitive Architecture</text>

  <!-- Outer guide -->
  <path d="M1000 180 C1500 180 1710 610 1450 900" stroke="#c9d5e6" stroke-width="3" fill="none"/>
  <path d="M1450 900 C1100 1120 590 1030 430 700" stroke="#c9d5e6" stroke-width="3" fill="none"/>
  <path d="M430 700 C240 410 500 180 850 180" stroke="#c9d5e6" stroke-width="3" fill="none"/>

  <!-- Purpose -->
  <rect x="850" y="200" width="300" height="120" rx="20" ry="20" fill="#eaf3ff" stroke="#4d8ef7" stroke-width="3"/>
  <text x="955" y="268" font-size="28" font-weight="700" font-family="Arial, sans-serif" fill="#142033">Purpose</text>
  <text x="900" y="298" font-size="16" font-family="Arial, sans-serif" fill="#4b5b73">intent / goal / meaning</text>

  <!-- Relation -->
  <rect x="1300" y="420" width="300" height="120" rx="20" ry="20" fill="#f0ebff" stroke="#8b68e8" stroke-width="3"/>
  <text x="1400" y="488" font-size="28" font-weight="700" font-family="Arial, sans-serif" fill="#142033">Relation</text>
  <text x="1350" y="518" font-size="16" font-family="Arial, sans-serif" fill="#4b5b73">affinity / connection</text>

  <!-- Memory -->
  <rect x="1300" y="700" width="300" height="120" rx="20" ry="20" fill="#e9f7ee" stroke="#43a463" stroke-width="3"/>
  <text x="1410" y="768" font-size="28" font-weight="700" font-family="Arial, sans-serif" fill="#142033">Memory</text>
  <text x="1360" y="798" font-size="16" font-family="Arial, sans-serif" fill="#4b5b73">experience / retention</text>

  <!-- Emotion -->
  <rect x="850" y="880" width="300" height="120" rx="20" ry="20" fill="#fff1ea" stroke="#f28a52" stroke-width="3"/>
  <text x="950" y="948" font-size="28" font-weight="700" font-family="Arial, sans-serif" fill="#142033">Emotion</text>
  <text x="895" y="978" font-size="16" font-family="Arial, sans-serif" fill="#4b5b73">resonance / motive / feeling</text>

  <!-- Expression -->
  <rect x="400" y="700" width="300" height="120" rx="20" ry="20" fill="#fff6e7" stroke="#d8a529" stroke-width="3"/>
  <text x="480" y="768" font-size="28" font-weight="700" font-family="Arial, sans-serif" fill="#142033">Expression</text>
  <text x="445" y="798" font-size="16" font-family="Arial, sans-serif" fill="#4b5b73">speech / action / response</text>

  <!-- Nexus center -->
  <circle cx="1000" cy="580" r="125" fill="#142033" stroke="#5f86c4" stroke-width="4"/>
  <text x="930" y="565" font-size="30" font-weight="700" font-family="Arial, sans-serif" fill="#f6f9ff">Nexus</text>
  <text x="905" y="600" font-size="17" font-family="Arial, sans-serif" fill="#d3dced">scheduler / state / arbitration</text>
  <text x="925" y="628" font-size="15" font-family="Arial, sans-serif" fill="#a9b8d0">人格循環の調停中枢</text>

  <!-- Main arrows -->
  <path d="M1000 320 L1000 455" stroke="#2f5ea8" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M1125 580 L1300 495" stroke="#2f5ea8" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M1450 540 L1450 700" stroke="#2f5ea8" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M1300 820 L1100 880" stroke="#2f5ea8" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M850 940 L700 825" stroke="#2f5ea8" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M700 700 L875 620" stroke="#2f5ea8" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <!-- Feedback arrows -->
  <path d="M1000 705 L1000 880" stroke="#7a94b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M700 760 C760 840, 820 900, 850 920" stroke="#7a94b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M550 700 C420 560, 460 300, 850 250" stroke="#7a94b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- Footer -->
  <rect x="140" y="1040" width="1720" height="110" rx="18" ry="18" fill="#ffffff" stroke="#d0dae7" stroke-width="2"/>
  <text x="190" y="1087" font-size="18" font-weight="700" font-family="Arial, sans-serif" fill="#142033">Cycle</text>
  <text x="270" y="1087" font-size="18" font-family="Arial, sans-serif" fill="#4b5b73">Purpose → Relation → Memory → Emotion → Expression → Feedback → Purpose</text>
  <text x="190" y="1122" font-size="16" font-family="Arial, sans-serif" fill="#4b5b73">Emotion Loop / Silence Engine / Self-Speech Architecture はこの人格循環の内部機構として位置づけられる</text>
</svg>
