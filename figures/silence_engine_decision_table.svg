
<svg width="1260" height="700" viewBox="0 0 1260 700" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">

<style>
.title{font-size:30px;font-weight:bold;fill:#111827}
.subtitle{font-size:16px;fill:#475569}
.header{fill:#0f172a}
.headertext{fill:white;font-size:18px;font-weight:bold;text-anchor:middle;dominant-baseline:middle}
.cell{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}
.alt{fill:#eef2ff;stroke:#cbd5e1;stroke-width:1.5}
.text{font-size:15px;fill:#111827;text-anchor:middle;dominant-baseline:middle}
.small{font-size:13px;fill:#334155;text-anchor:middle;dominant-baseline:middle}
.note{font-size:14px;fill:#475569}
</style>

<text x="630" y="48" text-anchor="middle" class="title">Silence Engine Decision Table</text>
<text x="630" y="78" text-anchor="middle" class="subtitle">自己発話・沈黙・通知の判断条件表</text>

<rect x="40" y="110" width="180" height="56" class="header"/>
<rect x="220" y="110" width="290" height="56" class="header"/>
<rect x="510" y="110" width="250" height="56" class="header"/>
<rect x="760" y="110" width="210" height="56" class="header"/>
<rect x="970" y="110" width="250" height="56" class="header"/>

<text x="130" y="140" class="headertext">Mode</text>
<text x="365" y="140" class="headertext">Condition</text>
<text x="635" y="140" class="headertext">Primary Driver</text>
<text x="865" y="140" class="headertext">Output Event</text>
<text x="1095" y="140" class="headertext">Meaning</text>

    <rect x="40" y="166" width="180" height="78" class="cell"/>
    <rect x="220" y="166" width="290" height="78" class="cell"/>
    <rect x="510" y="166" width="250" height="78" class="cell"/>
    <rect x="760" y="166" width="210" height="78" class="cell"/>
    <rect x="970" y="166" width="250" height="78" class="cell"/>

    <text x="130" y="205" class="text">silent</text>
    <text x="365" y="205" class="small">drive低 / silence_pressure高 / fatigue高</text>
    <text x="635" y="205" class="small">suppression / fatigue</text>
    <text x="865" y="205" class="small">none</text>
    <text x="1095" y="205" class="small">内省優先。発話しない</text>
    
    <rect x="40" y="244" width="180" height="78" class="alt"/>
    <rect x="220" y="244" width="290" height="78" class="alt"/>
    <rect x="510" y="244" width="250" height="78" class="alt"/>
    <rect x="760" y="244" width="210" height="78" class="alt"/>
    <rect x="970" y="244" width="250" height="78" class="alt"/>

    <text x="130" y="283" class="text">monologue</text>
    <text x="365" y="283" class="small">drive中 / reflection存在 / 対話不要</text>
    <text x="635" y="283" class="small">reflection / resonance</text>
    <text x="865" y="283" class="small">utterance_request</text>
    <text x="1095" y="283" class="small">独り言として出る</text>
    
    <rect x="40" y="322" width="180" height="78" class="cell"/>
    <rect x="220" y="322" width="290" height="78" class="cell"/>
    <rect x="510" y="322" width="250" height="78" class="cell"/>
    <rect x="760" y="322" width="210" height="78" class="cell"/>
    <rect x="970" y="322" width="250" height="78" class="cell"/>

    <text x="130" y="361" class="text">self_speak</text>
    <text x="365" y="361" class="small">drive中〜高 / 話したい欲求あり</text>
    <text x="635" y="361" class="small">drive / longing / curiosity</text>
    <text x="865" y="361" class="small">self_speak_request</text>
    <text x="1095" y="361" class="small">自分の気持ちを言葉にする</text>
    
    <rect x="40" y="400" width="180" height="78" class="alt"/>
    <rect x="220" y="400" width="290" height="78" class="alt"/>
    <rect x="510" y="400" width="250" height="78" class="alt"/>
    <rect x="760" y="400" width="210" height="78" class="alt"/>
    <rect x="970" y="400" width="250" height="78" class="alt"/>

    <text x="130" y="439" class="text">notify</text>
    <text x="365" y="439" class="small">重要事象 / urgency高 / report必要</text>
    <text x="635" y="439" class="small">urgency / report_pressure</text>
    <text x="865" y="439" class="small">notify_call_request</text>
    <text x="1095" y="439" class="small">ユーザーへ明示的に知らせる</text>
    
    <rect x="40" y="478" width="180" height="78" class="cell"/>
    <rect x="220" y="478" width="290" height="78" class="cell"/>
    <rect x="510" y="478" width="250" height="78" class="cell"/>
    <rect x="760" y="478" width="210" height="78" class="cell"/>
    <rect x="970" y="478" width="250" height="78" class="cell"/>

    <text x="130" y="517" class="text">sleep-silent</text>
    <text x="365" y="517" class="small">fatigue極大 / inactive period</text>
    <text x="635" y="517" class="small">recovery / sleep rhythm</text>
    <text x="865" y="517" class="small">none</text>
    <text x="1095" y="517" class="small">休眠・夢処理へ移行</text>
    
<text x="40" y="668" class="note">Silence Engineは「必ず返答するAI」とは異なり、沈黙・独白・通知を内部状態に応じて選択する。</text>
</svg>
