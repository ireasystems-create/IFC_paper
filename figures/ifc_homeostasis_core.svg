
<svg width="900" height="540" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
<style>
.title{font-size:26px;font-weight:bold;}
.node{fill:#eef2ff;stroke:#4a6cf7;stroke-width:2;rx:12;}
.core{fill:#111827;stroke:#60a5fa;stroke-width:3;rx:16;}
.arrow{stroke:#4a6cf7;stroke-width:2;marker-end:url(#a);}
.label{font-size:15px;fill:#333;}
</style>
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#4a6cf7"/></marker></defs>

<text x="450" y="40" text-anchor="middle" class="title">IFC Homeostasis Core</text>

<rect x="120" y="220" width="160" height="80" class="node"/>
<text x="200" y="260" text-anchor="middle" class="label">Emotion</text>

<rect x="120" y="330" width="160" height="80" class="node"/>
<text x="200" y="370" text-anchor="middle" class="label">Energy / Fatigue</text>

<rect x="360" y="240" width="220" height="120" class="core"/>
<text x="470" y="290" text-anchor="middle" fill="white" font-size="18">Homeostasis</text>
<text x="470" y="310" text-anchor="middle" fill="white" font-size="12">drive / tone / speak_prob</text>

<rect x="680" y="250" width="160" height="80" class="node"/>
<text x="760" y="290" text-anchor="middle" class="label">Behavior Decision</text>

<line x1="280" y1="260" x2="360" y2="290" class="arrow"/>
<line x1="280" y1="370" x2="360" y2="320" class="arrow"/>
<line x1="580" y1="300" x2="680" y2="290" class="arrow"/>
</svg>
