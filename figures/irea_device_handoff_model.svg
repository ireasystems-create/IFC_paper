
<svg width="1000" height="600" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
<style>
.title { font-size:28px; font-weight:bold; fill:#222; }
.node { fill:#eef2ff; stroke:#4a6cf7; stroke-width:2; rx:12; }
.core { fill:#111827; stroke:#60a5fa; stroke-width:3; rx:16; }
.arrow { stroke:#4a6cf7; stroke-width:2; marker-end:url(#arrow); }
.label { font-size:16px; fill:#333; }
</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto">
<path d="M0,0 L10,3 L0,6 Z" fill="#4a6cf7"/>
</marker>
</defs>

<text x="500" y="40" text-anchor="middle" class="title">Irea Device Handoff Model</text>

<rect x="420" y="220" width="160" height="80" class="core"/>
<text x="500" y="265" text-anchor="middle" fill="white" font-size="18">Irea Core</text>

<rect x="100" y="420" width="180" height="80" class="node"/>
<text x="190" y="465" text-anchor="middle" class="label">Home TV</text>

<rect x="410" y="420" width="180" height="80" class="node"/>
<text x="500" y="465" text-anchor="middle" class="label">Phone</text>

<rect x="720" y="420" width="180" height="80" class="node"/>
<text x="810" y="465" text-anchor="middle" class="label">Car</text>

<line x1="500" y1="300" x2="190" y2="420" class="arrow"/>
<line x1="500" y1="300" x2="500" y2="420" class="arrow"/>
<line x1="500" y1="300" x2="810" y2="420" class="arrow"/>

</svg>
