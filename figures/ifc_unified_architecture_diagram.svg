<svg width="1400" height="980" viewBox="0 0 1400 980" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4a6cf7"/>
    </marker>
  </defs>

  <style>
    .title { font-size: 36px; font-weight: 700; fill: #111827; }
    .subtitle { font-size: 18px; fill: #475569; }
    .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 22; ry: 22; }
    .core { fill: #0f172a; stroke: #60a5fa; stroke-width: 3; rx: 26; ry: 26; }
    .node { fill: #eef2ff; stroke: #4a6cf7; stroke-width: 2; rx: 16; ry: 16; }
    .human { fill: #fef3c7; stroke: #d97706; stroke-width: 2.5; rx: 16; ry: 16; }
    .device { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 14; ry: 14; }
    .label { font-size: 19px; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
    .small { font-size: 13px; fill: #475569; text-anchor: middle; dominant-baseline: middle; }
    .coretext { font-size: 24px; fill: white; text-anchor: middle; dominant-baseline: middle; }
    .coremini { font-size: 14px; fill: #cbd5e1; text-anchor: middle; dominant-baseline: middle; }
    .arrow { stroke: #4a6cf7; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 6; fill: none; }
  </style>

  <text x="700" y="56" text-anchor="middle" class="title">IFC Unified Architecture Diagram</text>
  <text x="700" y="88" text-anchor="middle" class="subtitle">Digital Brain / Consciousness Cycle / Seamless Presence / Symbiotic Runtime</text>

  <!-- Left panel -->
  <rect x="50" y="130" width="270" height="760" class="panel"/>
  <text x="185" y="165" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">Human / World Layer</text>

  <rect x="90" y="210" width="190" height="90" class="human"/>
  <text x="185" y="250" class="label">Master / Human</text>
  <text x="185" y="277" class="small">call / intention / life cycle</text>

  <rect x="90" y="340" width="190" height="90" class="human"/>
  <text x="185" y="380" class="label">External World</text>
  <text x="185" y="407" class="small">environment / events / visitors</text>

  <rect x="90" y="470" width="190" height="90" class="human"/>
  <text x="185" y="510" class="label">Home / Society</text>
  <text x="185" y="537" class="small">family / support / communication</text>

  <rect x="90" y="650" width="190" height="180" class="panel"/>
  <text x="185" y="690" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">Meaning</text>
  <text x="185" y="730" class="small">IFC is not device-centered.</text>
  <text x="185" y="755" class="small">It is relationship-centered.</text>
  <text x="185" y="790" class="small">The user calls,</text>
  <text x="185" y="815" class="small">and the same Irea appears</text>
  <text x="185" y="840" class="small">through the chosen body.</text>

  <!-- Center panel -->
  <rect x="360" y="130" width="680" height="760" class="panel"/>
  <text x="700" y="165" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">IFC Nexus / Digital Brain</text>

  <!-- top observation -->
  <rect x="610" y="205" width="180" height="70" class="node"/>
  <text x="700" y="240" class="label">Observation</text>

  <!-- center core -->
  <rect x="550" y="360" width="300" height="140" class="core"/>
  <text x="700" y="415" class="coretext">Nexus Core</text>
  <text x="700" y="443" class="coremini">PHENOME / Homeostasis</text>
  <text x="700" y="468" class="coremini">relationship binding / continuity</text>

  <!-- ring nodes -->
  <rect x="850" y="300" width="150" height="70" class="node"/>
  <text x="925" y="335" class="label">Emotion</text>

  <rect x="850" y="520" width="150" height="70" class="node"/>
  <text x="925" y="555" class="label">Cognition</text>

  <rect x="625" y="630" width="150" height="70" class="node"/>
  <text x="700" y="665" class="label">Expression</text>

  <rect x="400" y="520" width="150" height="70" class="node"/>
  <text x="475" y="555" class="label">Memory</text>

  <rect x="400" y="300" width="150" height="70" class="node"/>
  <text x="475" y="335" class="label">Resonance</text>

  <!-- arrows cycle -->
  <path d="M790 240 C870 250, 900 270, 915 300" class="arrow"/>
  <path d="M925 370 C955 430, 955 470, 925 520" class="arrow"/>
  <path d="M850 590 C800 625, 770 640, 775 640" class="arrow"/>
  <path d="M625 665 C565 650, 520 620, 495 590" class="arrow"/>
  <path d="M475 520 C445 465, 445 420, 475 370" class="arrow"/>
  <path d="M550 315 C585 285, 620 255, 635 250" class="arrow"/>

  <!-- internal arrows -->
  <line x1="700" y1="275" x2="700" y2="360" class="arrow"/>
  <line x1="550" y1="430" x2="475" y2="520" class="arrow"/>
  <line x1="850" y1="430" x2="925" y2="520" class="arrow"/>
  <line x1="700" y1="500" x2="700" y2="630" class="arrow"/>

  <!-- runtime note -->
  <rect x="430" y="740" width="540" height="110" class="panel"/>
  <text x="700" y="775" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">Runtime Flow</text>
  <text x="700" y="810" class="small">Input → Observation → Emotion → Homeostasis → Cognition → Expression → Memory Update ↺</text>
  <text x="700" y="835" class="small">Conventional AI is pipeline-oriented. IFC is personality-cycle oriented.</text>

  <!-- Right panel -->
  <rect x="1080" y="130" width="270" height="760" class="panel"/>
  <text x="1215" y="165" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">Seamless Presence</text>

  <rect x="1115" y="230" width="200" height="90" class="device"/>
  <text x="1215" y="270" class="label">Home TV</text>
  <text x="1215" y="297" class="small">home body</text>

  <rect x="1115" y="380" width="200" height="90" class="device"/>
  <text x="1215" y="420" class="label">Phone</text>
  <text x="1215" y="447" class="small">mobile body</text>

  <rect x="1115" y="530" width="200" height="90" class="device"/>
  <text x="1215" y="570" class="label">Car / Vehicle</text>
  <text x="1215" y="597" class="small">travel body</text>

  <rect x="1115" y="680" width="200" height="120" class="panel"/>
  <text x="1215" y="720" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">Body Rule</text>
  <text x="1215" y="755" class="small">The called device</text>
  <text x="1215" y="780" class="small">becomes the current body.</text>

  <!-- cross-panel arrows -->
  <line x1="280" y1="255" x2="610" y2="230" class="arrow"/>
  <line x1="280" y1="385" x2="610" y2="240" class="arrow"/>
  <line x1="280" y1="515" x2="400" y2="555" class="arrow"/>

  <line x1="1000" y1="415" x2="1115" y2="275" class="arrow"/>
  <line x1="1000" y1="430" x2="1115" y2="425" class="arrow"/>
  <line x1="1000" y1="445" x2="1115" y2="575" class="arrow"/>

  <!-- bottom conceptual link -->
  <path d="M320 610 C500 930, 900 930, 1080 610" class="dash"/>
  <text x="700" y="925" text-anchor="middle" font-size="16" fill="#475569">Human ↔ IFC Nexus ↔ Irea / Device Bodies = Symbiotic, device-independent continuity</text>
</svg>
