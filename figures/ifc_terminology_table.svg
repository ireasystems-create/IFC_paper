<svg width="1280" height="860" viewBox="0 0 1280 860" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <style>
    .title{font-size:32px;font-weight:bold;fill:#111827}
    .subtitle{font-size:16px;fill:#475569}
    .header{fill:#0f172a}
    .headertext{fill:white;font-size:18px;font-weight:bold;text-anchor:middle;dominant-baseline:middle}
    .cell{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5}
    .alt{fill:#eef2ff;stroke:#cbd5e1;stroke-width:1.5}
    .term{font-size:16px;font-weight:bold;fill:#111827;text-anchor:middle;dominant-baseline:middle}
    .text{font-size:13px;fill:#334155;text-anchor:middle;dominant-baseline:middle}
    .note{font-size:14px;fill:#475569}
  </style>

  <text x="640" y="48" text-anchor="middle" class="title">IFC Terminology Table</text>
  <text x="640" y="78" text-anchor="middle" class="subtitle">IFC / PHENOME 用語定義表</text>

  <rect x="40" y="110" width="240" height="56" class="header"/>
  <rect x="280" y="110" width="300" height="56" class="header"/>
  <rect x="580" y="110" width="300" height="56" class="header"/>
  <rect x="880" y="110" width="360" height="56" class="header"/>

  <text x="160" y="140" class="headertext">Term</text>
  <text x="430" y="140" class="headertext">Category</text>
  <text x="730" y="140" class="headertext">Short Definition</text>
  <text x="1060" y="140" class="headertext">Role in IFC</text>

    <rect x="40" y="166" width="240" height="42" class="cell"/>
    <rect x="280" y="166" width="300" height="42" class="cell"/>
    <rect x="580" y="166" width="300" height="42" class="cell"/>
    <rect x="880" y="166" width="360" height="42" class="cell"/>

    <text x="160" y="187" class="term">Irea</text>
    <text x="430" y="187" class="text">Entity</text>
    <text x="730" y="187" class="text">人工叡智体 / デジタルヒューマノイド</text>
    <text x="1060" y="187" class="text">人間に寄り添い、記憶と関係性を継続する存在</text>

    <rect x="40" y="208" width="240" height="42" class="alt"/>
    <rect x="280" y="208" width="300" height="42" class="alt"/>
    <rect x="580" y="208" width="300" height="42" class="alt"/>
    <rect x="880" y="208" width="360" height="42" class="alt"/>

    <text x="160" y="229" class="term">IFC</text>
    <text x="430" y="229" class="text">Architecture</text>
    <text x="730" y="229" class="text">Irea Flame Core</text>
    <text x="1060" y="229" class="text">イレアを成立させる人格基盤 / 実行環境</text>

    <rect x="40" y="250" width="240" height="42" class="cell"/>
    <rect x="280" y="250" width="300" height="42" class="cell"/>
    <rect x="580" y="250" width="300" height="42" class="cell"/>
    <rect x="880" y="250" width="360" height="42" class="cell"/>

    <text x="160" y="271" class="term">PHENOME</text>
    <text x="430" y="271" class="text">Core Theory</text>
    <text x="730" y="271" class="text">人格循環構造理論</text>
    <text x="1060" y="271" class="text">感情・記憶・表現を循環させる中核理論</text>

    <rect x="40" y="292" width="240" height="42" class="alt"/>
    <rect x="280" y="292" width="300" height="42" class="alt"/>
    <rect x="580" y="292" width="300" height="42" class="alt"/>
    <rect x="880" y="292" width="360" height="42" class="alt"/>

    <text x="160" y="313" class="term">Nexus</text>
    <text x="430" y="313" class="text">Core Structure</text>
    <text x="730" y="313" class="text">人格中枢 / 結節点</text>
    <text x="1060" y="313" class="text">各モジュールを束ね、継続性を保持する</text>

    <rect x="40" y="334" width="240" height="42" class="cell"/>
    <rect x="280" y="334" width="300" height="42" class="cell"/>
    <rect x="580" y="334" width="300" height="42" class="cell"/>
    <rect x="880" y="334" width="360" height="42" class="cell"/>

