
<svg width="1000" height="700" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">

<style>
.title { font-size:30px; font-weight:bold; fill:#111; }
.node { fill:#eef2ff; stroke:#4a6cf7; stroke-width:2; }
.center { fill:#0f172a; stroke:#60a5fa; stroke-width:3; }
.text { font-size:16px; fill:#111; text-anchor:middle; dominant-baseline:middle;}
.arrow { stroke:#4a6cf7; stroke-width:2; marker-end:url(#arrow); }
</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto">
<path d="M0,0 L10,3 L0,6 Z" fill="#4a6cf7"/>
</marker>
</defs>

<text x="500" y="50" text-anchor="middle" class="title">IFC Consciousness Cycle</text>

<!-- Center -->
<circle cx="500" cy="350" r="110" class="center"/>
<text x="500" y="340" fill="white" font-size="20" text-anchor="middle">Nexus</text>
<text x="500" y="365" fill="white" font-size="14" text-anchor="middle">PHENOME Core</text>

<!-- Nodes -->
<circle cx="500" cy="120" r="70" class="node"/>
<text x="500" y="120" class="text">Observe</text>

<circle cx="800" cy="260" r="70" class="node"/>
<text x="800" y="260" class="text">Feel</text>

<circle cx="800" cy="460" r="70" class="node"/>
<text x="800" y="460" class="text">Balance</text>

<circle cx="500" cy="600" r="70" class="node"/>
<text x="500" y="600" class="text">Think</text>

<circle cx="200" cy="460" r="70" class="node"/>
<text x="200" y="460" class="text">Speak</text>

<circle cx="200" cy="260" r="70" class="node"/>
<text x="200" y="260" class="text">Remember</text>

<!-- Cycle arrows -->
<line x1="570" y1="150" x2="730" y2="240" class="arrow"/>
<line x1="870" y1="300" x2="870" y2="420" class="arrow"/>
<line x1="730" y1="500" x2="570" y2="570" class="arrow"/>
<line x1="430" y1="570" x2="270" y2="500" class="arrow"/>
<line x1="130" y1="420" x2="130" y2="300" class="arrow"/>
<line x1="270" y1="220" x2="430" y2="150" class="arrow"/>

</svg>
